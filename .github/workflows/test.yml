name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt every JavaScript action into Node 24 ahead of GitHub's September 2026
# default flip. Match release.yml so both workflows behave identically when
# the Node 20 runtime is removed from runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Match go.mod's `go 1.23.0` directive so CI uses the same toolchain the
  # module declares, instead of relying on GOTOOLCHAIN=auto to silently fetch
  # it after pinning an older version.
  GO_VERSION: "1.23"

jobs:
  test:
    name: lint + race tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  # Compile on every target OS. The codebase has platform-specific files
  # (daemon_{darwin,linux,windows}.go, install_*.go), so an Ubuntu-only build
  # can't catch a macOS/Windows compile break — this matrix does.
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...

  # Known-vulnerability scan of stdlib + reachable dependencies. Report-only
  # for now (continue-on-error) so it surfaces advisories without surprise-
  # blocking PRs on a transitive CVE; flip to blocking once the team has
  # triaged the findings (most clear by keeping the Go toolchain current).
  vulncheck:
    name: govulncheck (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
