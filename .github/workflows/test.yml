name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt every JavaScript action into Node 24 ahead of GitHub's September 2026
# default flip. Match release.yml so both workflows behave identically when
# the Node 20 runtime is removed from runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Match go.mod's `go 1.23.0` directive so CI uses the same toolchain the
  # module declares, instead of relying on GOTOOLCHAIN=auto to silently fetch
  # it after pinning an older version.
  GO_VERSION: "1.23"

jobs:
  test:
    name: vet + race tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  # Static analysis via golangci-lint (config in .golangci.yml). Uses the
  # action's prebuilt binary, so the linter version is decoupled from the CI
  # Go toolchain.
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # action v7+ is required for golangci-lint v2.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # Compile on every target OS. The codebase has platform-specific files
  # (daemon_{darwin,linux,windows}.go, install_*.go), so an Ubuntu-only build
  # can't catch a macOS/Windows compile break — this matrix does.
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...

  # Known-vulnerability scan of stdlib + reachable dependencies. Report-only:
  # the job stays green and emits a warning annotation when advisories are
  # found, so it surfaces issues in the PR without blocking on a transitive
  # CVE. Read the job log for the details; flip to blocking (drop the `|| …`)
  # once the team has triaged the findings.
  vulncheck:
    name: govulncheck (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: govulncheck
        # Pin to a version that builds with the module's Go (1.23). govulncheck
        # @latest now requires Go >= 1.25, which would fail the `go install`
        # before the scan even runs.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./... || echo "::warning title=govulncheck::known advisories found (report-only, non-blocking) — see job log"
