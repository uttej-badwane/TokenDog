version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: .
    binary: td
    ldflags:
      - -s -w
      - -X tokendog/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: tokendog
    repository:
      owner: uttej-badwane
      name: homebrew-tokendog
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/uttej-badwane/TokenDog"
    description: "Token-optimized CLI proxy for AI coding assistants — saves 60-90% of tokens on common dev operations"
    license: "MIT"
    install: |
      bin.install "td"
      bin.install_symlink "td" => "tokendog"
      generate_completions_from_executable(bin/"td", "completion")
    test: |
      system "#{bin}/td --version"
      system "#{bin}/tokendog --version"
    caveats: |2
                    .---""""---.
                  .'   /\   /\  '.
                 /    /  \-/  \   \
                |    |  o   o  |   |
                |     \   ▼   /    |
                |      '.___.'     |
                 \    /|     |\   /
                  '. / |\ / /| \.'
                    \  | V V |  /
                     '-+-----+-'
                      T O K E N D O G

         Token-optimized CLI proxy for AI coding assistants
         ───────────────────────────────────────────────────

         Quick start:
           1. Add hooks to ~/.claude/settings.json:

              "hooks": {
                "PreToolUse": [{"matcher":"Bash","hooks":[{
                  "type":"command","command":"td hook claude"
                }]}],
                "PostToolUse": [
                  {"matcher":"WebFetch","hooks":[{
                    "type":"command","command":"td pipe webfetch"
                  }]},
                  {"matcher":"Glob","hooks":[{
                    "type":"command","command":"td pipe glob"
                  }]},
                  {"matcher":"Grep","hooks":[{
                    "type":"command","command":"td pipe grep"
                  }]},
                  {"matcher":"WebSearch","hooks":[{
                    "type":"command","command":"td pipe websearch"
                  }]}
                ]
              }

           2. View savings:    td gain
           3. Full history:    td gain --history

         Docs: https://github.com/uttej-badwane/TokenDog
