version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: .
    binary: td
    ldflags:
      - -s -w
      - -X tokendog/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: tokendog
    repository:
      owner: uttej-badwane
      name: homebrew-tokendog
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/uttej-badwane/TokenDog"
    description: "Token-optimized CLI proxy for AI coding assistants — saves 60-90% of tokens on common dev operations"
    license: "MIT"
    install: |
      bin.install "td"
      bin.install_symlink "td" => "tokendog"
      generate_completions_from_executable(bin/"td", "completion")
    test: |
      system "#{bin}/td --version"
      system "#{bin}/tokendog --version"
    caveats: |
      ████████╗ ██████╗ ██╗  ██╗███████╗███╗   ██╗██████╗  ██████╗  ██████╗
      ╚══██╔══╝██╔═══██╗██║ ██╔╝██╔════╝████╗  ██║██╔══██╗██╔═══██╗██╔════╝
         ██║   ██║   ██║█████╔╝ █████╗  ██╔██╗ ██║██║  ██║██║   ██║██║  ███╗
         ██║   ██║   ██║██╔═██╗ ██╔══╝  ██║╚██╗██║██║  ██║██║   ██║██║   ██║
         ██║   ╚██████╔╝██║  ██╗███████╗██║ ╚████║██████╔╝╚██████╔╝╚██████╔╝
         ╚═╝    ╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═══╝╚═════╝  ╚═════╝  ╚═════╝

      Token-optimized CLI proxy for AI coding assistants

      Run  td welcome   to see setup status and quick-start guide
      Run  td discover  to find unrewritten commands in your history
      Run  td gain      to see your current token savings
